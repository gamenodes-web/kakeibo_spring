<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <title>家計簿アプリ</title>
<style>
  body {
    font-family: sans-serif;
    max-width: 600px;
    margin: 50px auto;
    background-color: #f5f5f5;
  }
  h1 {
    color: #333;
    text-align: center;
  }
  h2 {
    color: #555;
  }
  input {
    font-size: 18px;
    margin: 5px;
    padding: 5px;
    border: 1px solid #ccc;
    border-radius: 5px;
  }
  button {
    font-size: 18px;
    margin: 10px 0;
    padding: 8px 20px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background-color: white;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
  }
  th {
    background-color: #4CAF50;
    color: white;
  }
  p {
    font-size: 20px;
    color: #555;
  }
</style>
  </head>
  <body>
    <h1>家計簿</h1>
    <form action="/keisan" method="post">
      <p>収入：<input type="number" name="sunyuu"></p>
      <p>支出：<input type="number" name="shishutsu"></p>
      <button type="submit">保存する</button>
    </form>

    <h2>履歴</h2>
  <table>
    <p>合計貯金：<span th:text="${goukei}"></span>円</p>
  <tr>
    <th>日付</th>
    <th>収入</th>
    <th>支出</th>
    <th>貯金</th>
  </tr>
  <tr th:each="data : ${list}">
    <td th:text="${data.date}"></td>
    <td th:text="${data.sunyuu}"></td>
    <td th:text="${data.shishutsu}"></td>
    <td th:text="${data.chokin}"></td>
  </tr>
　</table>
  </body>
</html>
